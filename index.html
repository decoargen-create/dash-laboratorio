<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/viora-favicon.svg" />
    <link rel="apple-touch-icon" href="/viora-pwa-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#4a0f22" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0d0d0d" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Viora" />
    <meta name="description" content="Laboratorio Viora — Panel de gestión de órdenes, clientes, comisiones y pagos." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Allura&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <title>Laboratorio Viora</title>
    <script>
      // Aplica dark mode antes del render para evitar flash de tema claro
      // cuando el user tiene preferencia oscura (propia o del sistema).
      (function () {
        try {
          var stored = localStorage.getItem('dash-dark-mode');
          var isDark = stored === null
            ? (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)
            : stored === 'true';
          if (isDark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
